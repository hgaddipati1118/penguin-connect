name: Bug report
description: Report a reproducible PenguinConnect bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please redact private data before posting logs,
        screenshots, message content, or OAuth-related material.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: The bridge rejects Gmail replies for a unified direct-message thread after route changes.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest reproducible sequence.
      placeholder: |
        1. Connect Gmail with the setup helper
        2. Start the bridge from Terminal.app
        3. Reply to a conversation alias from the connected Gmail address
        4. Observe the failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Apple Messages sync
        - Gmail connect or send flow
        - Setup or doctor scripts
        - Local storage or queue
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: macos_version
    attributes:
      label: macOS version
      placeholder: macOS 14.7.2
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: Python 3.11.11
  - type: dropdown
    id: full_disk_access
    attributes:
      label: Terminal.app Full Disk Access enabled?
      options:
        - "Yes"
        - "No"
        - Unsure
  - type: dropdown
    id: gmail_connected
    attributes:
      label: Gmail connected successfully?
      options:
        - "Yes"
        - "No"
        - Unsure
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Paste the smallest redacted snippet that proves the issue.
      placeholder: Include only scrubbed output. Do not post raw messages, tokens, or client secrets.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checks
      options:
        - label: I removed or redacted message content, tokens, client secrets, and other private data.
          required: true
        - label: I checked the setup guide before filing this issue.
          required: false
